<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro Henrique Gomes Rodrigues — Vision AI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=VT323&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --sky:      #7ec8e3;
      --sky2:     #b3e5f5;
      --grass:    #5dbb63;
      --grass2:   #3d9e4a;
      --finn:     #00aaff;
      --jake:     #f5a623;
      --jake2:    #e8891a;
      --marcy:    #6a0dad;
      --marcy2:   #9b30d4;
      --bubblegum:#ff69b4;
      --bmo:      #4fc3a1;
      --black:    #1a1a2e;
      --outline:  #1a1a2e;
      --white:    #fffef0;
      --cream:    #fff8dc;
      --btn-bg:   #f5a623;
      --btn-hover:#e8891a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--sky);
      font-family: 'Patrick Hand', cursive;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .clouds {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .cloud {
      position: absolute;
      background: var(--white);
      border-radius: 50px;
      border: 3px solid var(--outline);
      opacity: .85;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: var(--white);
      border-radius: 50%;
      border: 3px solid var(--outline);
    }
    .cloud-1 { width:120px;height:40px;top:8%;left:-5%; animation:drift1 28s linear infinite; }
    .cloud-1::before{width:60px;height:55px;top:-30px;left:15px;}
    .cloud-1::after {width:45px;height:42px;top:-22px;left:50px;}
    .cloud-2 { width:90px;height:30px;top:18%;left:20%; animation:drift1 38s linear infinite 8s; }
    .cloud-2::before{width:45px;height:42px;top:-24px;left:12px;}
    .cloud-2::after {width:35px;height:32px;top:-18px;left:38px;}
    .cloud-3 { width:140px;height:45px;top:5%;left:60%; animation:drift2 32s linear infinite 3s; }
    .cloud-3::before{width:70px;height:62px;top:-35px;left:20px;}
    .cloud-3::after {width:52px;height:48px;top:-26px;left:60px;}
    .cloud-4 { width:80px;height:28px;top:25%;left:80%; animation:drift2 22s linear infinite 12s; }
    .cloud-4::before{width:40px;height:38px;top:-22px;left:10px;}
    .cloud-4::after {width:30px;height:28px;top:-16px;left:35px;}

    @keyframes drift1 {
      0%   { transform: translateX(-200px); }
      100% { transform: translateX(110vw); }
    }
    @keyframes drift2 {
      0%   { transform: translateX(110vw); }
      100% { transform: translateX(-200px); }
    }

    .grass-bottom {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 0;
      pointer-events: none;
    }

    header {
      position: relative; z-index: 10;
      background: var(--black);
      border-bottom: 4px solid var(--jake);
      padding: .8rem 0;
    }

    .header-inner {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: .5rem;
    }

    .logo-text {
      font-family: 'Bangers', cursive;
      font-size: clamp(1rem, 3vw, 1.5rem);
      letter-spacing: .06em;
      color: var(--jake);
      text-shadow: 2px 2px 0 var(--outline), -1px -1px 0 var(--outline);
      text-decoration: none;
      line-height: 1;
    }

    .logo-text span { color: var(--bubblegum); }

    .badge-at {
      font-family: 'Bangers', cursive;
      font-size: .75rem; letter-spacing: .1em;
      color: var(--bmo);
      border: 2px solid var(--bmo);
      border-radius: 6px;
      padding: .15em .55em;
      background: rgba(79,195,161,.12);
      text-shadow: 1px 1px 0 var(--outline);
    }

    main { position: relative; z-index: 2; }

    .hero {
      padding: 2.5rem 0 2rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      letter-spacing: .08em; line-height: 1.05;
      color: var(--white);
      text-shadow:
        3px 3px 0 var(--outline),
        -1px -1px 0 var(--outline),
        1px -1px 0 var(--outline),
        -1px 1px 0 var(--outline);
      margin-bottom: .3rem;
    }

    .hero h1 .name-accent { color: var(--jake); }

    .hero-sub {
      font-family: 'VT323', monospace;
      font-size: 1.1rem; letter-spacing: .12em;
      color: var(--marcy2);
      text-shadow: 1px 1px 0 var(--outline);
      margin-bottom: 1.8rem;
    }

    .cam-frame-wrap {
      display: flex; justify-content: center;
      margin: 0 auto 2rem;
      max-width: 400px;
    }

    .cam-frame {
      position: relative;
      width: 100%; max-width: 360px;
    }

    .cam-border {
      border: 5px solid var(--outline);
      border-radius: 16px;
      overflow: hidden;
      background: var(--black);
      box-shadow:
        6px 6px 0 var(--outline),
        0 0 0 3px var(--jake),
        9px 9px 0 var(--outline);
      position: relative;
    }

    .cam-border::before {
      content: '★';
      position: absolute; top: 6px; left: 8px;
      font-size: 1rem; color: var(--jake);
      z-index: 5; pointer-events: none;
      text-shadow: 1px 1px 0 var(--outline);
    }
    .cam-border::after {
      content: '★';
      position: absolute; top: 6px; right: 8px;
      font-size: 1rem; color: var(--bubblegum);
      z-index: 5; pointer-events: none;
      text-shadow: 1px 1px 0 var(--outline);
    }

    .cam-placeholder {
      width: 100%;
      aspect-ratio: 1/1;
      background: #0d0d1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .6rem;
      min-height: 220px;
    }

    .cam-placeholder .eye-left,
    .cam-placeholder .eye-right {
      display: inline-block;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--finn);
      border: 3px solid var(--white);
      animation: blink-eyes 3.5s ease-in-out infinite;
    }
    .cam-placeholder .eyes {
      display: flex; gap: 24px; margin-bottom: .3rem;
    }
    @keyframes blink-eyes {
      0%,90%,100%{transform:scaleY(1)}
      93%{transform:scaleY(.08)}
    }
    .cam-placeholder p {
      font-family: 'Bangers', cursive;
      font-size: 1.1rem; letter-spacing: .08em;
      color: var(--jake);
      text-shadow: 1px 1px 0 var(--outline);
    }

    #webcam-container {
      width: 100%; display: flex; justify-content: center;
      background: #000; position: relative; overflow: hidden;
    }
    #webcam-container canvas {
      width: 100% !important; height: auto !important; display: block;
    }
    #webcam-container::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent 5%, rgba(245,166,35,.6) 40%, rgba(245,166,35,1) 50%, rgba(245,166,35,.6) 60%, transparent 95%);
      animation: camscan 2.5s linear infinite;
      opacity: 0; pointer-events: none; z-index: 3;
    }
    #webcam-container.active::after { opacity: 1; }
    @keyframes camscan { 0%{top:0%} 100%{top:100%} }

    .cam-label-bar {
      background: var(--jake);
      border-top: 3px solid var(--outline);
      padding: .3rem .8rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .cam-label-bar span {
      font-family: 'Bangers', cursive;
      font-size: .95rem; letter-spacing: .1em;
      color: var(--outline);
    }
    .cam-live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--outline); border: 2px solid var(--outline);
      transition: background .3s;
    }
    .cam-live-dot.live {
      background: #ff3333;
      border-color: var(--outline);
      animation: livedot 1s ease-in-out infinite;
    }
    @keyframes livedot {
      0%,100%{opacity:1} 50%{opacity:.2}
    }

    .btn-start {
      display: inline-flex; align-items: center; gap: .65rem;
      font-family: 'Bangers', cursive;
      font-size: 1.5rem; letter-spacing: .1em;
      color: var(--outline);
      background: var(--btn-bg);
      border: 4px solid var(--outline);
      border-radius: 12px;
      padding: .75rem 2.6rem;
      cursor: pointer; position: relative;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 4px 4px 0 var(--outline);
      text-shadow: none;
    }
    .btn-start:hover {
      transform: translate(-2px,-2px);
      box-shadow: 6px 6px 0 var(--outline);
      background: var(--bubblegum);
    }
    .btn-start:active {
      transform: translate(2px,2px);
      box-shadow: 2px 2px 0 var(--outline);
    }
    .btn-start.done {
      background: var(--bmo);
      cursor: default;
    }
    .btn-start.done:hover { transform: none; box-shadow: 4px 4px 0 var(--outline); background: var(--bmo); }

    .perm-note {
      margin-top: .75rem;
      font-size: .8rem;
      color: var(--black);
      opacity: .65;
      display: flex; align-items: center; justify-content: center; gap: .35rem;
    }

    .pred-card {
      background: var(--cream);
      border: 4px solid var(--outline);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 6px 6px 0 var(--outline);
      margin-bottom: 2rem;
    }

    .pred-card-header {
      background: var(--marcy);
      border-bottom: 4px solid var(--outline);
      padding: .55rem 1.2rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .pred-card-header span {
      font-family: 'Bangers', cursive;
      font-size: 1.1rem; letter-spacing: .1em;
      color: var(--white);
      text-shadow: 2px 2px 0 var(--outline);
    }

    .pred-body { padding: 1.2rem 1.4rem 1.5rem; }

    .pred-row { margin-bottom: 1rem; }
    .pred-row:last-child { margin-bottom: 0; }

    .pred-meta {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: .4rem;
    }
    .pred-cls {
      font-family: 'Patrick Hand', cursive;
      font-size: .88rem; font-weight: 700;
      color: var(--outline);
    }
    .pred-val {
      font-family: 'VT323', monospace;
      font-size: 1.05rem; letter-spacing: .05em;
      color: var(--marcy);
      min-width: 3.5rem; text-align: right;
      transition: color .3s;
    }
    .pred-val.top { color: var(--grass2); }

    .prog-track {
      height: 14px;
      background: rgba(26,26,46,.1);
      border: 2.5px solid var(--outline);
      border-radius: 99px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--finn), var(--bubblegum));
      border-radius: 99px;
      transition: width .32s ease;
    }
    .prog-fill.top {
      background: linear-gradient(90deg, var(--jake), var(--grass));
    }

    footer {
      position: relative; z-index: 2;
      background: var(--black);
      border-top: 4px solid var(--jake);
      padding: 1.2rem 0;
      text-align: center;
    }
    .ft-text {
      font-family: 'Patrick Hand', cursive;
      font-size: .82rem; color: rgba(255,248,220,.5);
    }
    .ft-text a { color: var(--jake); text-decoration: none; }
    .ft-text a:hover { color: var(--bubblegum); }

    .char-strip {
      display: flex; justify-content: center; align-items: flex-end;
      gap: clamp(.5rem, 2vw, 1.5rem);
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .at-char { width: clamp(48px,8vw,72px); flex-shrink:0; }

    @media (max-width: 576px) {
      .btn-start { font-size: 1.25rem; padding: .7rem 2rem; }
      .hero { padding: 1.8rem 0 1.5rem; }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/-bgkYkEJO/";
  let model, webcam, labelContainer, maxPredictions;
  let fills = [], valLabels = [], clsLabels = [];

  async function init() {
    const btn = document.getElementById("startBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm" style="width:.9rem;height:.9rem;border-width:2px;"></span> <span>CARREGANDO...</span>';

    try {
      model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      webcam = new tmImage.Webcam(360, 360, true);
      await webcam.setup();
      await webcam.play();

      document.getElementById("cam-placeholder").style.display = "none";
      const camEl = document.getElementById("webcam-container");
      camEl.appendChild(webcam.canvas);
      camEl.classList.add("active");

      document.getElementById("camDot").classList.add("live");
      document.getElementById("camLabel").textContent = "AO VIVO";
      document.getElementById("pred-card").style.display = "block";

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";
      fills = []; valLabels = []; clsLabels = [];

      for (let i = 0; i < maxPredictions; i++) {
        const row = document.createElement("div");
        row.className = "pred-row";

        const meta = document.createElement("div");
        meta.className = "pred-meta";

        const cls = document.createElement("span");
        cls.className = "pred-cls";
        cls.textContent = "Classe " + (i + 1);

        const val = document.createElement("span");
        val.className = "pred-val";
        val.textContent = "0.0%";

        meta.appendChild(cls);
        meta.appendChild(val);

        const track = document.createElement("div");
        track.className = "prog-track";

        const fill = document.createElement("div");
        fill.className = "prog-fill";
        fill.style.width = "0%";

        track.appendChild(fill);
        row.appendChild(meta);
        row.appendChild(track);
        labelContainer.appendChild(row);

        fills.push(fill);
        valLabels.push(val);
        clsLabels.push(cls);
      }

      btn.classList.add("done");
      btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> <span>CÂMERA ATIVA!</span>';

      window.requestAnimationFrame(loop);

    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> <span>TENTAR DE NOVO!</span>';
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    let maxIdx = 0;
    for (let i = 1; i < maxPredictions; i++) {
      if (prediction[i].probability > prediction[maxIdx].probability) maxIdx = i;
    }
    for (let i = 0; i < maxPredictions; i++) {
      const prob = prediction[i].probability;
      const pct  = (prob * 100).toFixed(1);
      const top  = (i === maxIdx && prob > 0.45);
      clsLabels[i].textContent = prediction[i].className;
      valLabels[i].textContent = pct + "%";
      fills[i].style.width = pct + "%";
      if (top) {
        fills[i].classList.add("top");
        valLabels[i].classList.add("top");
      } else {
        fills[i].classList.remove("top");
        valLabels[i].classList.remove("top");
      }
    }
  }
</script>
